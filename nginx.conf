user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    '[API: $upstream_addr]';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Upstream configuration untuk API instances
    # Use service name 'api' dengan load balancer directive
    upstream api_backend {
        # Docker DNS resolver untuk service discovery
        server api:8080;
        # Note: Docker akan resolve 'api' ke semua instances secara otomatis
        
        # Keepalive connections ke upstream
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # API Endpoints - Load Balanced
        location /barang {
            proxy_pass http://api_backend;
            
            # Headers untuk upstream server
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Keepalive ke upstream
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            
            # Timeouts
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "nginx load balancer OK\n";
            add_header Content-Type text/plain;
        }

        # Nginx stats (optional)
        location /nginx_status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            allow 172.0.0.0/8;
            deny all;
        }
    }
}
