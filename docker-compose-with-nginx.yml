version: "3.9"
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass123
      POSTGRES_DB: barangdb
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    environment:
      DB_HOST: db
      DB_NAME: barangdb
      DB_USER: postgres
      DB_PASSWORD: pass123
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend
      - api-network
    # Note: Tidak expose port 8080 ke luar container
    # Hanya accessible via nginx dalam network

  # Load Balancer - Nginx
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"  # External port 8080 -> Nginx port 80
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - api-network
      - frontend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    environment:
      - TZ=Asia/Jakarta

  web:
    build: ./web
    ports:
      - "8000:5000"
    environment:
      API_URL: http://nginx:80  # Point ke Nginx load balancer instead of api
      TZ: Asia/Jakarta
    depends_on:
      nginx:
        condition: service_healthy
    networks:
      - frontend
    restart: on-failure

networks:
  backend:
    driver: bridge
  api-network:
    driver: bridge
  frontend:
    driver: bridge

volumes:
  db-data:
